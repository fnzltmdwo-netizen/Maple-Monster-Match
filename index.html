<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>메이플 몬스터 닮은꼴 테스트</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: #25243a;
      background:
        radial-gradient(circle at 90% 20%, #dbe6ff 0, transparent 30%),
        linear-gradient(135deg, #f7f8ff, #eef3ff);
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      max-width: 780px;
      margin: 0 auto;
      padding: 34px 18px 60px;
    }

    .hero { text-align: center; }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      box-shadow: 0 8px 24px rgba(78, 89, 180, 0.12);
      font-size: 13px;
      font-weight: 800;
      color: #6370ff;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
      letter-spacing: -1px;
    }

    .subtitle {
      margin: 14px auto 0;
      color: #6c6a83;
      line-height: 1.6;
      font-size: 15px;
    }

    .main-card {
      margin-top: 28px;
      padding: 24px;
      border-radius: 28px;
      background: rgba(255,255,255,0.84);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(74, 86, 160, 0.18);
      border: 1px solid rgba(255,255,255,0.8);
    }

    .upload-box {
      border-radius: 24px;
      padding: 26px 18px;
      background: linear-gradient(180deg, rgba(247,248,255,0.9), rgba(255,255,255,0.9));
      cursor: pointer;
      transition: 0.25s ease;
      text-align: center;
      display: block;
    }

    .upload-box:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(99,112,255,0.14);
    }

    .upload-icon {
      font-size: 44px;
      animation: bounceSoft 2.2s infinite;
    }

    .upload-title {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 900;
    }

    .upload-desc {
      margin-top: 7px;
      font-size: 14px;
      color: #77758e;
    }

    #imageInput { display: none; }

    .name-wrap {
      margin-top: 18px;
      text-align: center;
    }

    #userName {
      width: 100%;
      max-width: 320px;
      padding: 15px 18px;
      border: 1px solid #dfe3ff;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 800;
      text-align: center;
      outline: none;
      color: #25243a;
      background: white;
      box-shadow: 0 10px 24px rgba(99,112,255,0.1);
    }

    #userName:focus {
      border-color: #6370ff;
      box-shadow: 0 12px 28px rgba(99,112,255,0.18);
    }

    .preview-wrap {
      display: none;
      margin-top: 20px;
      text-align: center;
      animation: fadeUp 0.45s ease both;
    }

    #preview {
      max-width: 270px;
      max-height: 320px;
      width: 100%;
      object-fit: cover;
      border-radius: 24px;
      box-shadow: 0 14px 36px rgba(38, 45, 98, 0.22);
      border: 5px solid white;
    }

    .button-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 15px 22px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.22s ease;
    }

    .primary-btn {
      color: white;
      background: linear-gradient(135deg, #6370ff, #9b5cff);
      box-shadow: 0 12px 28px rgba(99,112,255,0.28);
    }

    .primary-btn:disabled {
      background: #b8bad1;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .ghost-btn {
      background: white;
      color: #6370ff;
      border: 1px solid #dfe3ff;
    }

    .loading {
      display: none;
      margin-top: 24px;
      text-align: center;
    }

    .loader-monster {
      width: 78px;
      height: 78px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffe07d, #ff8cc6);
      box-shadow: 0 12px 30px rgba(255, 140, 198, 0.35);
      position: relative;
      animation: pulseMonster 1.1s ease-in-out infinite;
    }

    .loader-monster::before,
    .loader-monster::after {
      content: "";
      position: absolute;
      top: 25px;
      width: 10px;
      height: 10px;
      background: #25243a;
      border-radius: 50%;
    }

    .loader-monster::before { left: 22px; }
    .loader-monster::after { right: 22px; }

    .loader-mouth {
      width: 26px;
      height: 12px;
      border-bottom: 4px solid #25243a;
      border-radius: 0 0 20px 20px;
      position: absolute;
      left: 50%;
      top: 42px;
      transform: translateX(-50%);
    }

    .loading-text {
      font-weight: 900;
      color: #6370ff;
    }

    .loading-dots::after {
      content: "";
      animation: dots 1.2s steps(4, end) infinite;
    }

    #result { margin-top: 26px; }

    .analysis-box {
      text-align: center;
      background: linear-gradient(135deg, #f5f7ff, #fff7fb);
      border: 1px solid #e7eaff;
      padding: 20px;
      border-radius: 24px;
      box-shadow: 0 10px 28px rgba(74, 86, 160, 0.1);
      animation: fadeUp 0.55s ease both;
    }

    .analysis-box h3 {
      margin: 0 0 8px;
      font-size: 19px;
    }

    .analysis-box p {
      margin: 0;
      color: #5d5a75;
      line-height: 1.55;
    }

    .tag-list {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
    }

    .tag {
      display: inline-block;
      padding: 7px 11px;
      border-radius: 999px;
      background: white;
      color: #6370ff;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 6px 16px rgba(99,112,255,0.1);
    }

    .result-title {
      margin: 26px 0 16px;
      font-size: 25px;
      text-align: center;
    }

    .card-list {
      display: grid;
      gap: 18px;
    }

    .monster-card {
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.95);
      border-radius: 26px;
      padding: 22px;
      border: 1px solid rgba(222,226,255,0.9);
      box-shadow: 0 14px 36px rgba(57, 68, 140, 0.14);
      text-align: center;
      animation: slideUp 0.55s ease both;
    }

    .monster-card.top1 {
      border: 2px solid #ffd45a;
      box-shadow:
        0 18px 46px rgba(255, 191, 38, 0.25),
        0 0 0 6px rgba(255, 221, 112, 0.18);
    }

    .monster-card::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #eef1ff;
      top: -90px;
      right: -80px;
      z-index: 0;
    }

    .monster-card > * {
      position: relative;
      z-index: 1;
    }

    .rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 13px;
      border-radius: 999px;
      background: linear-gradient(135deg, #6370ff, #9b5cff);
      color: white;
      font-weight: 900;
      font-size: 14px;
      margin-bottom: 10px;
    }

      background: linear-gradient(135deg, #
