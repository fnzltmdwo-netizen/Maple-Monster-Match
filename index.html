<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메이플 몬스터 닮은꼴 테스트</title>

  <style>
    body {
      margin: 0;
      background: #f3f6ff;
      font-family: Arial, sans-serif;
      color: #222;
    }

    .container {
      max-width: 720px;
      margin: 30px auto;
      padding: 32px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 24px;
    }

    input[type="file"] {
      margin: 20px 0;
    }

    button {
      background: #5b6cff;
      color: white;
      border: none;
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #4454e8;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    #preview {
      max-width: 260px;
      border-radius: 16px;
      margin: 16px auto;
      display: none;
    }

    #loading {
      display: none;
      margin-top: 20px;
      font-weight: bold;
      color: #5b6cff;
    }

    .analysis-box {
      background: #f3f6ff;
      padding: 18px;
      border-radius: 16px;
      margin: 24px 0;
      text-align: left;
    }

    .analysis-box h3 {
      margin-top: 0;
    }

    .card-list {
      display: grid;
      gap: 18px;
      margin-top: 20px;
    }

    .monster-card {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      text-align: center;
      border: 1px solid #eef1ff;
    }

    .monster-card img {
      max-width: 160px;
      height: auto;
      margin: 10px auto;
      display: block;
    }

    .rank {
      font-weight: bold;
      color: #5b6cff;
      font-size: 18px;
    }

    .monster-card h3 {
      margin-bottom: 8px;
    }

    .monster-card p {
      color: #555;
      line-height: 1.5;
    }

    .tag-list {
      margin-top: 10px;
    }

    .tag {
      display: inline-block;
      background: #eef1ff;
      color: #4a55cc;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      margin: 4px;
    }

    .error {
      color: #e74c3c;
      font-weight: bold;
      margin-top: 20px;
    }

    .share-btn {
      margin-top: 20px;
      background: #222;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>메이플 몬스터 닮은꼴 테스트</h1>
    <p class="subtitle">사진을 올리면 AI가 닮은 메이플 몬스터 TOP 3를 찾아줘요</p>

    <input type="file" id="imageInput" accept="image/*" />
    <br />

    <img id="preview" />

    <br />
    <button id="analyzeBtn" onclick="analyzeImage()">몬스터 찾기</button>

    <div id="loading">몬스터 찾는 중...</div>

    <div id="result"></div>
  </div>

  <script>
    const API_URL = "https://maple-monster-match.onrender.com/match";

    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const resultBox = document.getElementById("result");
    const loading = document.getElementById("loading");
    const analyzeBtn = document.getElementById("analyzeBtn");

    let selectedBase64 = "";

    imageInput.addEventListener("change", function () {
      const file = imageInput.files[0];

      if (!file) return;

      const reader = new FileReader();

      reader.onload = function (e) {
        selectedBase64 = e.target.result;
        preview.src = selectedBase64;
        preview.style.display = "block";
        resultBox.innerHTML = "";
      };

      reader.readAsDataURL(file);
    });

    async function analyzeImage() {
      if (!selectedBase64) {
        alert("사진을 먼저 선택해줘!");
        return;
      }

      loading.style.display = "block";
      resultBox.innerHTML = "";
      analyzeBtn.disabled = true;

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            image_base64: selectedBase64,
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "API 호출 실패");
        }

        if (!data.results || data.results.length === 0) {
          resultBox.innerHTML = `<div class="error">닮은 몬스터를 찾지 못했어요 😭</div>`;
          return;
        }

        const analysis = data.analysis || {};
        const tags = analysis.tags || [];
        const vibe = analysis.vibe || "";

        resultBox.innerHTML = `
          <div class="analysis-box">
            <h3>AI 분석 결과</h3>
            <p>${vibe || "사진의 전체 분위기를 분석했어요."}</p>
            <div class="tag-list">
              ${tags.map(tag => `<span class="tag">#${tag}</span>`).join("")}
            </div>
          </div>

          <h2>닮은 메이플 몬스터 TOP 3</h2>

          <div class="card-list">
            ${data.results.map((monster, index) => `
              <div class="monster-card">
                <div class="rank">${index + 1}위</div>

                ${
                  monster.image_url
                    ? `<img src="${monster.image_url}" alt="${monster.name}" />`
                    : ""
                }

                <h3>${monster.name}</h3>
                <p>${monster.reason || "전체적인 분위기가 비슷해서 매칭됐어요."}</p>

                <div class="tag-list">
                  ${(monster.tags || []).map(tag => `<span class="tag">#${tag}</span>`).join("")}
                </div>

                <p><strong>매칭 점수:</strong> ${monster.score}</p>
              </div>
            `).join("")}
          </div>

          <button class="share-btn" onclick="shareResult()">결과 공유하기</button>
        `;

      } catch (error) {
        console.error(error);
        resultBox.innerHTML = `
          <div class="error">
            API 호출 실패 😭<br />
            ${error.message}
          </div>
        `;
      } finally {
        loading.style.display = "none";
        analyzeBtn.disabled = false;
      }
    }

    function shareResult() {
      const shareUrl = window.location.href;

      if (navigator.share) {
        navigator.share({
          title: "메이플 몬스터 닮은꼴 테스트",
          text: "내가 닮은 메이플 몬스터는?!",
          url: shareUrl,
        });
      } else {
        navigator.clipboard.writeText(shareUrl);
        alert("링크가 복사됐어!");
      }
    }
  </script>
</body>
</html>
