<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메이플 몬스터 닮은꼴</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif;
      background: #eef3ff;
      color: #222;
      text-align: center;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 18px 60px;
    }

    .app-box {
      background: white;
      border-radius: 28px;
      padding: 32px 22px;
      box-shadow: 0 14px 40px rgba(65, 90, 180, 0.16);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      font-weight: 900;
    }

    .sub {
      margin: 0 0 26px;
      color: #666;
      font-size: 17px;
      line-height: 1.5;
    }

    input[type="file"] { margin: 16px 0; }

    #preview {
      display: none;
      width: 230px;
      max-width: 80%;
      margin: 18px auto;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      margin: 8px 5px;
      background: #6578ff;
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(101, 120, 255, 0.28);
    }

    button:hover { background: #5264e8; }

    .ghost-btn {
      background: #f0f3ff;
      color: #596cff;
      box-shadow: none;
    }

    #loading {
      display: none;
      margin-top: 24px;
      color: #596cff;
      font-weight: 800;
    }

    .spinner {
      width: 58px;
      height: 58px;
      margin: 0 auto 14px;
      border: 7px solid #dfe5ff;
      border-top-color: #6578ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #result { margin-top: 30px; }

    .result-card {
      background: #f7f9ff;
      border-radius: 24px;
      padding: 24px 18px;
      margin-top: 20px;
      box-shadow: inset 0 0 0 1px #e2e7ff;
    }

    .monster-img-box {
      width: 120px;
      height: 120px;
      margin: 12px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 58px;
    }

    .monster-img-box img {
      max-width: 120px;
      max-height: 120px;
      object-fit: contain;
      display: block;
    }

    .rank-title {
      font-size: 26px;
      font-weight: 900;
      margin: 8px 0;
    }

    .score {
      color: #6578ff;
      font-size: 24px;
      font-weight: 900;
      margin: 8px 0 16px;
    }

    .rpg-info {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 620px;
      margin: 18px auto;
    }

    .rpg-item {
      background: white;
      border-radius: 16px;
      padding: 12px 8px;
      box-shadow: 0 5px 12px rgba(40, 60, 120, 0.08);
    }

    .rpg-label {
      font-size: 12px;
      color: #777;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .rpg-value {
      font-size: 16px;
      color: #222;
      font-weight: 900;
    }

    .grade-S { color: #ff9f1c; }
    .grade-A { color: #6578ff; }
    .grade-B { color: #20a67a; }
    .grade-C { color: #777; }

    .reason {
      max-width: 520px;
      margin: 0 auto;
      color: #444;
      font-size: 16px;
      line-height: 1.7;
      word-break: keep-all;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 560px;
      margin: 20px auto 0;
    }

    .stat {
      background: white;
      border-radius: 16px;
      padding: 12px 8px;
      font-weight: 900;
      font-size: 14px;
      color: #444;
    }

    .top3-list {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }

    .mini-card {
      background: white;
      border-radius: 18px;
      padding: 14px;
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 12px;
      align-items: center;
      text-align: left;
      box-shadow: 0 5px 14px rgba(40, 60, 120, 0.08);
    }

    .mini-img-box {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
    }

    .mini-img-box img {
      max-width: 64px;
      max-height: 64px;
      object-fit: contain;
      display: block;
    }

    .mini-title {
      font-weight: 900;
      margin-bottom: 4px;
    }

    .mini-meta {
      font-size: 13px;
      color: #6578ff;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .mini-reason {
      font-size: 14px;
      color: #666;
      line-height: 1.45;
    }

    #shareArea {
      display: none;
      margin-top: 34px;
    }

    .sns-card-wrap {
      display: flex;
      justify-content: center;
    }

    #snsCard {
      width: 430px;
      min-height: 720px;
      padding: 44px 34px;
      background: #f1f5ff;
    }

    .sns-inner {
      width: 100%;
      min-height: 640px;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sns-header {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 28px;
      color: #202124;
    }

    .sns-sub {
      font-size: 17px;
      color: #666;
      margin-bottom: 24px;
    }

    .sns-main-box {
      width: 100%;
      min-height: 360px;
      background: #eef3ff;
      border-radius: 22px;
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      word-break: keep-all;
    }

    .sns-img-box {
      width: 110px;
      height: 110px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
    }

    .sns-img-box img {
      max-width: 110px;
      max-height: 110px;
      object-fit: contain;
      display: block;
    }

    #snsName {
      font-size: 34px;
      line-height: 1.2;
      font-weight: 900;
      margin-bottom: 8px;
      color: #222;
    }

    #snsPercent {
      color: #6578ff;
      font-size: 27px;
      font-weight: 900;
      margin-bottom: 16px;
    }

    .sns-rpg {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      width: 100%;
      margin-bottom: 18px;
    }

    .sns-rpg div {
      background: white;
      border-radius: 12px;
      padding: 8px 6px;
      font-size: 13px;
      font-weight: 900;
      color: #444;
    }

    #snsDesc {
      font-size: 18px;
      line-height: 1.65;
      color: #444;
      max-width: 300px;
    }

    .sns-footer {
      margin-top: auto;
      padding-top: 32px;
      color: #999;
      font-size: 15px;
    }

    .sns-link {
      margin-top: 14px;
      color: #6578ff;
      font-size: 18px;
      font-weight: 900;
    }

    .share-buttons {
      margin-top: 18px;
    }

    @media (max-width: 520px) {
      h1 { font-size: 27px; }

      .stat-grid,
      .rpg-info {
        grid-template-columns: repeat(2, 1fr);
      }

      #snsCard {
        width: 360px;
        min-height: 650px;
        padding: 36px 24px;
      }

      .sns-inner { min-height: 580px; }
      .sns-header { font-size: 24px; }
      #snsName { font-size: 30px; }
      #snsPercent { font-size: 24px; }
      #snsDesc { font-size: 16px; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="app-box">
      <h1>🍄 메이플 몬스터 닮은꼴</h1>
      <p class="sub">사진을 올리면 가장 닮은 메이플 몬스터 TOP 3를 찾아줘요.</p>

      <input type="file" id="imageInput" accept="image/*" />
      <img id="preview" alt="preview" />

      <div>
        <button onclick="analyzeImage()">몬스터 찾기</button>
      </div>

      <div id="loading">
        <div class="spinner"></div>
        <div>몬스터 세계에서 닮은꼴 찾는 중...</div>
      </div>

      <div id="result"></div>

      <div id="shareArea">
        <h2>📸 SNS 공유 카드</h2>

        <div class="sns-card-wrap">
          <div id="snsCard">
            <div class="sns-inner">
              <div class="sns-header">🍄 메이플 몬스터 닮은꼴</div>
              <div class="sns-sub">당신과 가장 닮은 몬스터는...</div>

              <div class="sns-main-box">
                <div class="sns-img-box" id="snsImgBox">🍄</div>
                <div id="snsName">-</div>
                <div id="snsPercent">-% 닮음</div>

                <div class="sns-rpg">
                  <div id="snsRank">등급 -</div>
                  <div id="snsType">타입 -</div>
                  <div id="snsRarity">희귀도 -</div>
                  <div id="snsPower">전투력 -</div>
                </div>

                <div id="snsDesc">-</div>
              </div>

              <div class="sns-footer">maple-monster-match</div>
              <div class="sns-link">나도 테스트하러 가기 🍄</div>
            </div>
          </div>
        </div>

        <div class="share-buttons">
          <button onclick="openCardPreview()">카드 새창 보기</button>
          <button class="ghost-btn" onclick="shareLink()">공유하기</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://maple-monster-match.onrender.com/match";
    const FRONT_URL = "https://maple-monster-frontend.onrender.com";

    const MONSTER_IMAGE_MAP = {
      "이글루 터틀": "https://maplestory.io/api/KMS/389/mob/5130103/icon",
      "코-크 달팽이": "https://maplestory.io/api/KMS/389/mob/9500144/icon",
      "코크 달팽이": "https://maplestory.io/api/KMS/389/mob/9500144/icon",
      "코-크달팽이": "https://maplestory.io/api/KMS/389/mob/9500144/icon",
      "코크달팽이": "https://maplestory.io/api/KMS/389/mob/9500144/icon"
    };

    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");

    let selectedBase64 = "";
    let bestMonster = null;

    imageInput.addEventListener("change", function () {
      const file = imageInput.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function (e) {
        selectedBase64 = e.target.result;
        preview.src = selectedBase64;
        preview.style.display = "block";
      };

      reader.readAsDataURL(file);
    });

    function safeValue(value, fallback = "-") {
      if (value === undefined || value === null || value === "" || value === 0 || value === "-") {
        return fallback;
      }
      return value;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getMonsterName(monster) {
      return monster.name || monster.monster_name || monster.몬스터명 || monster.monster || "이름 없는 몬스터";
    }

    function getMonsterImage(monster) {
      const name = getMonsterName(monster);
      return (
        monster.image_url ||
        monster.img ||
        monster.image ||
        monster.monster_image ||
        monster.icon ||
        MONSTER_IMAGE_MAP[name] ||
        ""
      );
    }

    function getMonsterReason(monster) {
      return monster.reason || monster.description || monster.desc || "전체적인 분위기와 인상이 비슷해요.";
    }

    function getMonsterScore(monster) {
      return monster.match_percent || monster.percent || monster.similarity || monster.match_score || 85;
    }

    function getMonsterRank(monster) {
      return monster.rank || monster.grade || "A";
    }

    function getMonsterRarity(monster) {
      return monster.rarity || "Epic";
    }

    function getMonsterType(monster) {
      return monster.monster_type || monster.type || "밸런스형";
    }

    function getMonsterPower(monster) {
      return monster.power_score || monster.battle_power || 7777;
    }

    function getRankClass(monster) {
      return `grade-${getMonsterRank(monster)}`;
    }

    function createMonsterImageBox(monster, boxClass) {
      const img = getMonsterImage(monster);

      if (!img) {
        return `<div class="${boxClass}">🍄</div>`;
      }

      return `
        <div class="${boxClass}">
          <img src="${escapeHtml(img)}" alt="monster" onerror="this.remove(); this.parentElement.innerHTML='🍄';" />
        </div>
      `;
    }

    async function analyzeImage() {
      if (!selectedBase64) {
        alert("사진을 먼저 업로드해줘!");
        return;
      }

      document.getElementById("loading").style.display = "block";
      document.getElementById("result").innerHTML = "";
      document.getElementById("shareArea").style.display = "none";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image_base64: selectedBase64 })
        });

        if (!response.ok) {
          throw new Error("API 호출 실패");
        }

        const data = await response.json();
        console.log("API RESULT:", data);

        const monsters = data.top3 || data.matches || data.results || data.monsters || [];

        if (!monsters.length) {
          throw new Error("몬스터 결과 없음");
        }

        bestMonster = monsters[0];

        renderResult(monsters);
        renderShareCard(bestMonster);

      } catch (error) {
        console.error(error);
        alert("분석 실패 😭 다시 시도해줘!");
      } finally {
        document.getElementById("loading").style.display = "none";
      }
    }

    function renderResult(monsters) {
      const result = document.getElementById("result");
      const main = monsters[0];

      result.innerHTML = `
        <div class="result-card">
          <div class="rank-title">✨ 1위 ${escapeHtml(getMonsterName(main))}</div>
          ${createMonsterImageBox(main, "monster-img-box")}
          <div class="score">${escapeHtml(getMonsterScore(main))}% 닮음</div>

          <div class="rpg-info">
            <div class="rpg-item">
              <div class="rpg-label">등급</div>
              <div class="rpg-value ${escapeHtml(getRankClass(main))}">${escapeHtml(getMonsterRank(main))}</div>
            </div>
            <div class="rpg-item">
              <div class="rpg-label">타입</div>
              <div class="rpg-value">${escapeHtml(getMonsterType(main))}</div>
            </div>
            <div class="rpg-item">
              <div class="rpg-label">희귀도</div>
              <div class="rpg-value">${escapeHtml(getMonsterRarity(main))}</div>
            </div>
            <div class="rpg-item">
              <div class="rpg-label">전투력</div>
              <div class="rpg-value">⚔️ ${escapeHtml(getMonsterPower(main))}</div>
            </div>
          </div>

          <div class="reason">${escapeHtml(getMonsterReason(main))}</div>

          <div class="stat-grid">
            <div class="stat">분위기 ${escapeHtml(safeValue(main.vibe || main.mood || main.atmosphere, "calm"))}</div>
            <div class="stat">귀여움 ${escapeHtml(safeValue(main.cute || main.cuteness || main.cute_level, "높음"))}</div>
            <div class="stat">어둠 ${escapeHtml(safeValue(main.dark || main.darkness || main.dark_level, "낮음"))}</div>
            <div class="stat">포스 ${escapeHtml(safeValue(main.force || main.power || main.power_level, "중간"))}</div>
          </div>
        </div>

        <div class="top3-list">
          ${monsters.map((m, index) => `
            <div class="mini-card">
              ${createMonsterImageBox(m, "mini-img-box")}
              <div>
                <div class="mini-title">${index + 1}위. ${escapeHtml(getMonsterName(m))} · ${escapeHtml(getMonsterScore(m))}%</div>
                <div class="mini-meta">${escapeHtml(getMonsterRank(m))}등급 · ${escapeHtml(getMonsterType(m))} · ${escapeHtml(getMonsterRarity(m))} · 전투력 ${escapeHtml(getMonsterPower(m))}</div>
                <div class="mini-reason">${escapeHtml(getMonsterReason(m))}</div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderShareCard(monster) {
      const img = getMonsterImage(monster);

      document.getElementById("snsName").innerText = getMonsterName(monster);
      document.getElementById("snsPercent").innerText = `${getMonsterScore(monster)}% 닮음`;
      document.getElementById("snsDesc").innerText = getMonsterReason(monster);

      document.getElementById("snsRank").innerText = `등급 ${getMonsterRank(monster)}`;
      document.getElementById("snsType").innerText = `타입 ${getMonsterType(monster)}`;
      document.getElementById("snsRarity").innerText = `희귀도 ${getMonsterRarity(monster)}`;
      document.getElementById("snsPower").innerText = `전투력 ${getMonsterPower(monster)}`;

      const snsImgBox = document.getElementById("snsImgBox");

      if (img) {
        snsImgBox.innerHTML = `<img src="${escapeHtml(img)}" alt="monster" onerror="this.remove(); this.parentElement.innerHTML='🍄';" />`;
      } else {
        snsImgBox.innerHTML = "🍄";
      }

      document.getElementById("shareArea").style.display = "block";
    }

    function openCardPreview() {
      if (!bestMonster) {
        alert("먼저 몬스터를 찾아줘!");
        return;
      }

      const name = escapeHtml(getMonsterName(bestMonster));
      const img = escapeHtml(getMonsterImage(bestMonster));
      const reason = escapeHtml(getMonsterReason(bestMonster));
      const score = escapeHtml(getMonsterScore(bestMonster));
      const rank = escapeHtml(getMonsterRank(bestMonster));
      const type = escapeHtml(getMonsterType(bestMonster));
      const rarity = escapeHtml(getMonsterRarity(bestMonster));
      const power = escapeHtml(getMonsterPower(bestMonster));

      const imgHtml = img
        ? `<img src="${img}" alt="monster" onerror="this.remove(); this.parentElement.innerHTML='🍄';" />`
        : `🍄`;

      const newWindow = window.open("", "_blank");

      if (!newWindow) {
        alert("팝업이 차단됐어! 브라우저에서 팝업 허용해줘.");
        return;
      }

      const popupHtml = `
        <!DOCTYPE html>
        <html lang="ko">
        <head>
          <meta charset="UTF-8" />
          <title>메이플 몬스터 카드</title>
          <style>
            * { box-sizing: border-box; }

            body {
              margin: 0;
              min-height: 100vh;
              background: #171923;
              display: flex;
              align-items: center;
              justify-content: center;
              padding: 18px;
              font-family: Arial, sans-serif;
            }

            .card {
              width: min(430px, 92vw);
              background: #f1f5ff;
              padding: 28px 22px;
              border-radius: 18px;
            }

            .inner {
              width: 100%;
              background: #ffffff;
              border-radius: 24px;
              padding: 24px;
              display: flex;
              flex-direction: column;
              align-items: center;
              text-align: center;
            }

            .header {
              font-size: 24px;
              font-weight: 900;
              margin-bottom: 22px;
              color: #202124;
            }

            .sub {
              font-size: 16px;
              color: #666;
              margin-bottom: 18px;
            }

            .main-box {
              width: 100%;
              background: #eef3ff;
              border-radius: 22px;
              padding: 26px 18px;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              word-break: keep-all;
            }

            .img-box {
              width: 100px;
              height: 100px;
              margin-bottom: 14px;
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 58px;
            }

            .img-box img {
              max-width: 100px;
              max-height: 100px;
              object-fit: contain;
            }

            .name {
              font-size: 28px;
              line-height: 1.2;
              font-weight: 900;
              margin-bottom: 8px;
              color: #222;
            }

            .percent {
              color: #6578ff;
              font-size: 24px;
              font-weight: 900;
              margin-bottom: 14px;
            }

            .rpg {
              display: grid;
              grid-template-columns: repeat(2, 1fr);
              gap: 8px;
              width: 100%;
              margin-bottom: 16px;
            }

            .rpg div {
              background: white;
              border-radius: 12px;
              padding: 8px 6px;
              font-size: 13px;
              font-weight: 900;
              color: #444;
            }

            .desc {
              font-size: 16px;
              line-height: 1.6;
              color: #444;
              max-width: 300px;
            }

            .footer {
              margin-top: 24px;
              color: #999;
              font-size: 14px;
            }

            .link {
              margin-top: 10px;
              color: #6578ff;
              font-size: 17px;
              font-weight: 900;
            }
          </style>
        </head>

        <body>
          <div class="card">
            <div class="inner">
              <div class="header">🍄 메이플 몬스터 닮은꼴</div>
              <div class="sub">당신과 가장 닮은 몬스터는...</div>

              <div class="main-box">
                <div class="img-box">${imgHtml}</div>
                <div class="name">${name}</div>
                <div class="percent">${score}% 닮음</div>

                <div class="rpg">
                  <div>등급 ${rank}</div>
                  <div>타입 ${type}</div>
                  <div>희귀도 ${rarity}</div>
                  <div>전투력 ${power}</div>
                </div>

                <div class="desc">${reason}</div>
              </div>

              <div class="footer">maple-monster-match</div>
              <div class="link">나도 테스트하러 가기 🍄</div>
            </div>
          </div>
        </body>
        </html>
      `;

      newWindow.document.open();
      newWindow.document.write(popupHtml);
      newWindow.document.close();
    }

    async function shareLink() {
      const shareText = bestMonster
        ? `내 메이플 몬스터 닮은꼴은 ${getMonsterName(bestMonster)}!`
        : "메이플 몬스터 닮은꼴 테스트";

      if (navigator.share) {
        try {
          await navigator.share({
            title: "메이플 몬스터 닮은꼴",
            text: shareText,
            url: FRONT_URL
          });
          return;
        } catch (error) {
          console.log(error);
        }
      }

      try {
        await navigator.clipboard.writeText(FRONT_URL);
        alert("테스트 링크가 복사됐어!");
      } catch (error) {
        alert(FRONT_URL);
      }
    }
  </script>
</body>
</html>
