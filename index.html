<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>메이플 몬스터 닮은꼴 테스트</title>

  <style>
    body {
      margin: 0;
      background: #f3f6ff;
      font-family: Arial, sans-serif;
      color: #222;
    }

    .container {
      max-width: 720px;
      margin: 30px auto;
      padding: 32px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }

    #preview {
      width: 230px;
      max-height: 260px;
      object-fit: cover;
      border-radius: 12px;
      margin: 24px auto;
      display: none;
    }

    button {
      border: none;
      background: #6678ff;
      color: white;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .section-title {
      text-align: left;
      margin-top: 36px;
      font-size: 24px;
    }

    #analysis {
      text-align: left;
      line-height: 1.8;
      margin-top: 16px;
      font-size: 15px;
    }

    .loading-box {
      margin-top: 30px;
      background: #eef2ff;
      border-radius: 14px;
      padding: 26px 20px;
      text-align: center;
    }

    .loading-icon {
      font-size: 38px;
      animation: bounce 1.1s infinite;
      margin-bottom: 10px;
    }

    .loading-text {
      font-size: 18px;
      font-weight: bold;
      color: #6678ff;
      margin-bottom: 12px;
    }

    .dots::after {
      content: "";
      animation: dots 1.2s infinite;
    }

    @keyframes dots {
      0% { content: ""; }
      33% { content: "."; }
      66% { content: ".."; }
      100% { content: "..."; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .monster-card {
      background: #eef2ff;
      border-radius: 14px;
      padding: 28px 20px;
      margin: 18px 0;
      text-align: center;
    }

    .monster-img {
      width: 130px;
      height: 130px;
      object-fit: contain;
      display: block;
      margin: 0 auto 14px;
      image-rendering: pixelated;
    }

    .monster-name {
      font-size: 19px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .percent {
      color: #5c6cff;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 14px;
    }
  </style>
</head>

<body>
<div class="container">
  <h1>🍄 메이플 몬스터 닮은꼴 테스트</h1>
  <p>정면 얼굴 사진을 올리면 GPT가 닮은 몬스터 Top 3를 찾아줘요!</p>

  <input type="file" id="imageInput" accept="image/*"/>
  <br>

  <img id="preview"/>
  <br>

  <button id="matchButton" onclick="findMonster()">몬스터 찾기</button>

  <div id="result"></div>
</div>

<script>
const API_URL = "https://maple-monster-match.onrender.com/match";

const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const result = document.getElementById("result");
const matchButton = document.getElementById("matchButton");

let imageBase64 = "";

imageInput.addEventListener("change", function () {
    const file = imageInput.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {
        imageBase64 = e.target.result;
        preview.src = imageBase64;
        preview.style.display = "block";
        result.innerHTML = "";
    };

    reader.readAsDataURL(file);
});

function safeText(value, fallback = "") {
    if (value === undefined || value === null || value === "") {
        return fallback;
    }
    return String(value);
}

function faceToKorean(face) {
    const map = {
        round: "둥근형",
        oval: "계란형",
        long: "긴형",
        square: "각진형",
        triangle: "삼각형"
    };
    return map[face] || face || "-";
}

function vibeToKorean(vibe) {
    const map = {
        cute: "귀여움",
        calm: "차분함",
        dark: "어두움",
        strong: "강함",
        mysterious: "신비로움"
    };
    return map[vibe] || vibe || "-";
}

async function findMonster() {
    if (!imageBase64) {
        alert("사진을 선택해주세요!");
        return;
    }

    matchButton.disabled = true;
    matchButton.innerText = "찾는 중...";

    result.innerHTML = `
      <div class="loading-box">
        <div class="loading-icon">🍄</div>
        <div class="loading-text">
          얼굴 분석 중<span class="dots"></span>
        </div>
        <p id="loadingStep">얼굴형을 확인하고 있어요...</p>
      </div>
    `;

    const loadingMessages = [
      "얼굴형을 확인하고 있어요...",
      "눈매와 분위기를 비교하고 있어요...",
      "메이플 몬스터 DB를 검색하고 있어요...",
      "가장 닮은 몬스터 Top 3를 고르는 중..."
    ];

    let step = 0;

    const loadingInterval = setInterval(() => {
      step++;

      const el = document.getElementById("loadingStep");
      if (!el) return;

      el.innerText = loadingMessages[step % loadingMessages.length];
    }, 1200);

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                image_base64: imageBase64
            })
        });

        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText);
        }

        const data = await response.json();

        const person = data.person_features || data.features || {};
        const top3 = data.top3 || [];

        let html = `
            <h2 class="section-title">✨ 분석 결과</h2>
            <div id="analysis">
                얼굴형: <b>${faceToKorean(person.face_shape)}</b><br>
                분위기: <b>${vibeToKorean(person.vibe)}</b><br>
                귀여움: <b>${safeText(person.cute_level, 0)}</b> /
                어둠: <b>${safeText(person.dark_level, 0)}</b> /
                포스: <b>${safeText(person.power_level, 0)}</b>
            </div>

            <h2 class="section-title">🏆 닮은 몬스터 Top 3</h2>
        `;

        top3.forEach((item, index) => {
            html += `
                <div class="monster-card">
                    <img class="monster-img"
                         src="${safeText(item.image_url)}"
                         onerror="this.style.display='none'">

                    <div class="monster-name">
                        ${["🥇","🥈","🥉"][index]} ${safeText(item.name, "이름 없음")}
                    </div>

                    <div class="percent">
                        ${safeText(item.match_percent, 90)}% 닮음
                    </div>

                    <div>
                        ${safeText(item.reason, "")}
                    </div>
                </div>
            `;
        });

        result.innerHTML = html;

    } catch (e) {
        result.innerHTML = `
          <h2 class="section-title">😭 오류 발생</h2>
          <p>API 호출에 실패했어요.</p>
        `;
        console.error(e);

    } finally {
        clearInterval(loadingInterval);
        matchButton.disabled = false;
        matchButton.innerText = "몬스터 찾기";
    }
}
</script>
</body>
</html>
