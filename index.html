</head>

<body>
  <div class="page">
    <div class="app-box">
      <h1>🍄 메이플 몬스터 닮은꼴</h1>
      <p class="sub">사진을 올리면 가장 닮은 메이플 몬스터 TOP 3를 찾아줘요.</p>

      <input type="file" id="imageInput" accept="image/*" />
      <img id="preview" alt="preview" />

      <div>
        <button onclick="analyzeImage()">몬스터 찾기</button>
      </div>

      <div id="loading">
        <div class="spinner"></div>
        <div>몬스터 세계에서 닮은꼴 찾는 중...</div>
      </div>

      <div id="result"></div>

      <div id="shareArea">
        <h2>📸 SNS 공유 카드</h2>

        <div class="sns-card-wrap">
          <div id="snsCard">
            <div class="sns-inner">
              <div class="sns-header">🍄 메이플 몬스터 닮은꼴</div>
              <div class="sns-sub">당신과 가장 닮은 몬스터는...</div>

              <div class="sns-main-box">
                <img id="snsImg" alt="monster" />
                <div id="snsName">-</div>
                <div id="snsPercent">-% 닮음</div>
                <div id="snsDesc">-</div>
              </div>

              <div class="sns-footer">maple-monster-match</div>
              <div class="sns-link">나도 테스트하러 가기 🍄</div>
            </div>
          </div>
        </div>

        <div class="share-buttons">
          <button onclick="openCardPreview()">카드 크게 보기</button>
          <button onclick="saveCardImage()">이미지 저장</button>
          <button class="ghost-btn" onclick="shareCard()">공유하기</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://maple-monster-match.onrender.com/match";

    const MONSTER_IMAGE_MAP = {
      "이글루 터틀": "https://maplestory.io/api/KMS/389/mob/5130103/icon"
    };

    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");

    let selectedBase64 = "";
    let bestMonster = null;

    imageInput.addEventListener("change", function () {
      const file = imageInput.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function (e) {
        selectedBase64 = e.target.result;
        preview.src = selectedBase64;
        preview.style.display = "block";
      };

      reader.readAsDataURL(file);
    });

    function safeValue(value, fallback = "-") {
      if (value === undefined || value === null || value === "" || value === 0 || value === "-") {
        return fallback;
      }
      return value;
    }

    function getMonsterName(monster) {
      return monster.name || monster.monster_name || monster.몬스터명 || monster.monster || "이름 없는 몬스터";
    }

    function getMonsterImage(monster) {
      const name = getMonsterName(monster);

      return (
        monster.image_url ||
        monster.img ||
        monster.image ||
        monster.monster_image ||
        monster.icon ||
        MONSTER_IMAGE_MAP[name] ||
        ""
      );
    }

    function getMonsterReason(monster) {
      return (
        monster.reason ||
        monster.description ||
        monster.desc ||
        "전체적인 분위기와 인상이 비슷해요."
      );
    }

    function getMonsterScore(monster) {
      return (
        monster.score ||
        monster.similarity ||
        monster.match_score ||
        monster.percent ||
        85
      );
    }

    function makeImageTag(monster, className) {
      const img = getMonsterImage(monster);
      if (!img) return "";
      return `<img class="${className}" src="${img}" crossorigin="anonymous" referrerpolicy="no-referrer" />`;
    }

    async function analyzeImage() {
      if (!selectedBase64) {
        alert("사진을 먼저 업로드해줘!");
        return;
      }

      document.getElementById("loading").style.display = "block";
      document.getElementById("result").innerHTML = "";
      document.getElementById("shareArea").style.display = "none";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            image_base64: selectedBase64
          })
        });

        if (!response.ok) {
          throw new Error("API 호출 실패");
        }

        const data = await response.json();

        console.log("API RESULT:", data);

        const monsters =
          data.top3 ||
          data.matches ||
          data.results ||
          data.monsters ||
          [];

        if (!monsters.length) {
          throw new Error("몬스터 결과 없음");
        }

        bestMonster = monsters[0];

        renderResult(monsters);
        renderShareCard(bestMonster);

      } catch (error) {
        console.error(error);
        alert("분석 실패 😭 다시 시도해줘!");
      } finally {
        document.getElementById("loading").style.display = "none";
      }
    }

    function renderResult(monsters) {
      const result = document.getElementById("result");
      const main = monsters[0];

      const name = getMonsterName(main);
      const reason = getMonsterReason(main);
      const score = getMonsterScore(main);

      result.innerHTML = `
        <div class="result-card">
          <div class="rank-title">✨ 1위 ${name}</div>
          ${makeImageTag(main, "monster-img")}
          <div class="score">${score}% 닮음</div>

          <div class="reason">${reason}</div>

          <div class="stat-grid">
            <div class="stat">분위기 ${safeValue(main.vibe || main.mood || main.atmosphere, "몽글")}</div>
            <div class="stat">귀여움 ${safeValue(main.cute || main.cuteness, "높음")}</div>
            <div class="stat">어둠 ${safeValue(main.dark || main.darkness, "낮음")}</div>
            <div class="stat">포스 ${safeValue(main.force || main.power, "중간")}</div>
          </div>
        </div>

        <div class="top3-list">
          ${monsters.map((m, index) => `
            <div class="mini-card">
              <div>
                ${makeImageTag(m, "")}
              </div>
              <div>
                <div class="mini-title">${index + 1}위. ${getMonsterName(m)} · ${getMonsterScore(m)}%</div>
                <div class="mini-reason">${getMonsterReason(m)}</div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderShareCard(monster) {
      const name = getMonsterName(monster);
      const img = getMonsterImage(monster);
      const reason = getMonsterReason(monster);
      const score = getMonsterScore(monster);

      document.getElementById("snsName").innerText = name;
      document.getElementById("snsPercent").innerText = `${score}% 닮음`;
      document.getElementById("snsDesc").innerText = reason;

      const snsImg = document.getElementById("snsImg");

      if (img) {
        snsImg.crossOrigin = "anonymous";
        snsImg.referrerPolicy = "no-referrer";
        snsImg.src = img;
        snsImg.style.display = "block";
      } else {
        snsImg.style.display = "none";
      }

      document.getElementById("shareArea").style.display = "block";
    }

    async function makeCardCanvas() {
      const card = document.getElementById("snsCard");

      return await html2canvas(card, {
        backgroundColor: "#f1f5ff",
        scale: 2,
        useCORS: true,
        allowTaint: true
      });
    }

    async function openCardPreview() {
      const canvas = await makeCardCanvas();
      const imageUrl = canvas.toDataURL("image/png");

      const newWindow = window.open("", "_blank");

      if (!newWindow) {
        alert("팝업이 차단됐어! 브라우저에서 팝업 허용해줘.");
        return;
      }

      newWindow.document.write(`
        <!DOCTYPE html>
        <html lang="ko">
        <head>
          <meta charset="UTF-8" />
          <title>메이플 몬스터 카드</title>
          <style>
            body {
              margin: 0;
              min-height: 100vh;
              background: #171923;
              display: flex;
              align-items: center;
              justify-content: center;
              padding: 24px;
            }

            img {
              max-width: 95vw;
              max-height: 95vh;
              border-radius: 16px;
              box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            }
          </style>
        </head>
        <body>
          <img src="${imageUrl}" alt="메이플 몬스터 카드" />
        </body>
        </html>
      `);

      newWindow.document.close();
    }

    async function saveCardImage() {
      const canvas = await makeCardCanvas();
      const imageUrl = canvas.toDataURL("image/png");

      const link = document.createElement("a");
      link.download = "maple_monster_card.png";
      link.href = imageUrl;
      link.click();
    }

    async function shareCard() {
      const canvas = await makeCardCanvas();

      canvas.toBlob(async function (blob) {
        const file = new File([blob], "maple_monster_card.png", {
          type: "image/png"
        });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            title: "메이플 몬스터 닮은꼴",
            text: "내 메이플 몬스터 닮은꼴 결과!",
            files: [file]
          });
        } else {
          alert("이 브라우저에서는 바로 공유가 안 돼서 이미지 저장을 사용해줘!");
        }
      });
    }
  </script>
</body>
</html>
