<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>메이플 몬스터 닮은꼴 테스트</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: #25243a;
      background:
        radial-gradient(circle at 10% 10%, #ffe1f0 0, transparent 28%),
        radial-gradient(circle at 90% 20%, #dbe6ff 0, transparent 30%),
        radial-gradient(circle at 50% 90%, #fff0c7 0, transparent 28%),
        linear-gradient(135deg, #f7f8ff, #eef3ff);
      overflow-x: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(3px);
      opacity: 0.55;
      z-index: 0;
      animation: floatBlob 7s ease-in-out infinite;
    }

    .blob.one {
      width: 180px;
      height: 180px;
      background: #ffb8dc;
      top: 8%;
      left: -50px;
    }

    .blob.two {
      width: 220px;
      height: 220px;
      background: #b9c8ff;
      right: -70px;
      top: 18%;
      animation-delay: 1.2s;
    }

    .blob.three {
      width: 170px;
      height: 170px;
      background: #ffe08a;
      left: 12%;
      bottom: 6%;
      animation-delay: 2.1s;
    }

    @keyframes floatBlob {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-22px) scale(1.06);
      }
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 780px;
      margin: 0 auto;
      padding: 34px 18px 60px;
    }

    .hero {
      text-align: center;
      animation: fadeDown 0.7s ease both;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.75);
      box-shadow: 0 8px 24px rgba(78, 89, 180, 0.12);
      font-size: 13px;
      font-weight: 800;
      color: #6370ff;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
      letter-spacing: -1px;
    }

    .subtitle {
      margin: 14px auto 0;
      color: #6c6a83;
      line-height: 1.6;
      font-size: 15px;
    }

    .main-card {
      margin-top: 28px;
      padding: 24px;
      border-radius: 28px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(74, 86, 160, 0.18);
      border: 1px solid rgba(255,255,255,0.8);
      animation: popIn 0.75s ease both;
    }

    .upload-box {
      position: relative;
      border: 2px dashed #aab4ff;
      border-radius: 24px;
      padding: 26px 18px;
      background: linear-gradient(180deg, rgba(247,248,255,0.9), rgba(255,255,255,0.9));
      cursor: pointer;
      transition: 0.25s ease;
    }

    .upload-box:hover {
      transform: translateY(-3px);
      border-color: #6370ff;
      box-shadow: 0 12px 30px rgba(99,112,255,0.14);
    }

    .upload-icon {
      font-size: 44px;
      animation: bounceSoft 2.2s infinite;
    }

    .upload-title {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 900;
    }

    .upload-desc {
      margin-top: 7px;
      font-size: 14px;
      color: #77758e;
    }

    #imageInput {
      display: none;
    }

    .preview-wrap {
      display: none;
      margin-top: 20px;
      animation: fadeUp 0.45s ease both;
    }

    #preview {
      max-width: 270px;
      max-height: 320px;
      width: 100%;
      object-fit: cover;
      border-radius: 24px;
      box-shadow: 0 14px 36px rgba(38, 45, 98, 0.22);
      border: 5px solid white;
    }

    .button-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 15px 22px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.22s ease;
    }

    .primary-btn {
      color: white;
      background: linear-gradient(135deg, #6370ff, #9b5cff);
      box-shadow: 0 12px 28px rgba(99,112,255,0.28);
    }

    .primary-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 18px 34px rgba(99,112,255,0.35);
    }

    .primary-btn:disabled {
      background: #b8bad1;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .ghost-btn {
      background: white;
      color: #6370ff;
      border: 1px solid #dfe3ff;
    }

    .ghost-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(99,112,255,0.12);
    }

    .loading {
      display: none;
      margin-top: 24px;
      text-align: center;
      animation: fadeUp 0.3s ease both;
    }

    .loader-monster {
      width: 78px;
      height: 78px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffe07d, #ff8cc6);
      box-shadow: 0 12px 30px rgba(255, 140, 198, 0.35);
      position: relative;
      animation: pulseMonster 1.1s ease-in-out infinite;
    }

    .loader-monster::before,
    .loader-monster::after {
      content: "";
      position: absolute;
      top: 25px;
      width: 10px;
      height: 10px;
      background: #25243a;
      border-radius: 50%;
    }

    .loader-monster::before {
      left: 22px;
    }

    .loader-monster::after {
      right: 22px;
    }

    .loader-mouth {
      width: 26px;
      height: 12px;
      border-bottom: 4px solid #25243a;
      border-radius: 0 0 20px 20px;
      position: absolute;
      left: 50%;
      top: 42px;
      transform: translateX(-50%);
    }

    .loading-text {
      font-weight: 900;
      color: #6370ff;
    }

    .loading-dots::after {
      content: "";
      animation: dots 1.2s steps(4, end) infinite;
    }

    #result {
      margin-top: 26px;
    }

    .analysis-box {
      text-align: left;
      background: linear-gradient(135deg, #f5f7ff, #fff7fb);
      border: 1px solid #e7eaff;
      padding: 20px;
      border-radius: 24px;
      box-shadow: 0 10px 28px rgba(74, 86, 160, 0.1);
      animation: fadeUp 0.55s ease both;
    }

    .analysis-box h3 {
      margin: 0 0 8px;
      font-size: 19px;
    }

    .analysis-box p {
      margin: 0;
      color: #5d5a75;
      line-height: 1.55;
    }

    .tag-list {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag {
      display: inline-block;
      padding: 7px 11px;
      border-radius: 999px;
      background: white;
      color: #6370ff;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 6px 16px rgba(99,112,255,0.1);
    }

    .result-title {
      margin: 26px 0 16px;
      font-size: 25px;
      text-align: center;
      animation: fadeUp 0.55s ease both;
    }

    .card-list {
      display: grid;
      gap: 18px;
    }

    .monster-card {
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.95);
      border-radius: 26px;
      padding: 22px;
      border: 1px solid rgba(222,226,255,0.9);
      box-shadow: 0 14px 36px rgba(57, 68, 140, 0.14);
      text-align: center;
      animation: slideUp 0.55s ease both;
      transition: 0.25s ease;
    }

    .monster-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 22px 46px rgba(57, 68, 140, 0.2);
    }

    .monster-card.top1 {
      border: 2px solid #ffd45a;
      box-shadow:
        0 18px 46px rgba(255, 191, 38, 0.25),
        0 0 0 6px rgba(255, 221, 112, 0.18);
    }

    .monster-card::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #eef1ff;
      top: -90px;
      right: -80px;
      z-index: 0;
    }

    .monster-card > * {
      position: relative;
      z-index: 1;
    }

    .rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 13px;
      border-radius: 999px;
      background: linear-gradient(135deg, #6370ff, #9b5cff);
      color: white;
      font-weight: 900;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .top1 .rank {
      background: linear-gradient(135deg, #ffbd2f, #ff8f3d);
      animation: glow 1.6s ease-in-out infinite;
    }

    .monster-card img {
      width: 150px;
      max-height: 150px;
      object-fit: contain;
      display: block;
      margin: 8px auto 12px;
      filter: drop-shadow(0 12px 12px rgba(0,0,0,0.12));
      animation: floatMonster 2.6s ease-in-out infinite;
    }

    .monster-card h3 {
      margin: 10px 0 8px;
      font-size: 23px;
    }

    .monster-card p {
      margin: 8px 0;
      color: #5e5b76;
      line-height: 1.55;
    }

    .percent {
      margin: 12px auto 4px;
      max-width: 260px;
    }

    .percent-top {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 900;
      color: #52506b;
      margin-bottom: 7px;
    }

    .bar {
      height: 12px;
      background: #eef1ff;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #6370ff, #ff8cc6);
      animation: fillBar 1s ease forwards;
    }

    .share-area {
      margin-top: 24px;
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }

    .share-btn {
      color: white;
      background: linear-gradient(135deg, #25243a, #55516e);
      animation: bounceTiny 2.5s ease-in-out infinite;
    }

    .error {
      padding: 18px;
      border-radius: 18px;
      background: #fff0f0;
      color: #e74c3c;
      font-weight: 900;
      line-height: 1.5;
      animation: shake 0.3s ease both;
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.96) translateY(16px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(26px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bounceSoft {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-7px);
      }
    }

    @keyframes pulseMonster {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }

    @keyframes dots {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75% { content: "..."; }
      100% { content: ""; }
    }

    @keyframes floatMonster {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-7px);
      }
    }

    @keyframes fillBar {
      from {
        width: 0%;
      }
      to {
        width: var(--percent);
      }
    }

    @keyframes glow {
      0%, 100% {
        box-shadow: 0 0 0 rgba(255,189,47,0);
      }
      50% {
        box-shadow: 0 0 22px rgba(255,189,47,0.55);
      }
    }

    @keyframes bounceTiny {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    @media (max-width: 520px) {
      .page {
        padding: 24px 14px 44px;
      }

      h1 {
        font-size: 28px;
      }

      .main-card {
        padding: 18px;
        border-radius: 24px;
      }

      .monster-card {
        padding: 20px 16px;
      }
    }
  </style>
</head>

<body>
  <div class="blob one"></div>
  <div class="blob two"></div>
  <div class="blob three"></div>

  <main class="page">
    <section class="hero">
      <div class="badge">AI Maple Monster Match</div>
      <h1>메이플 몬스터<br />닮은꼴 테스트</h1>
      <p class="subtitle">
        사진을 올리면 AI가 분위기 태그를 분석해서<br />
        가장 닮은 메이플 몬스터 TOP 3를 찾아줘요 ✨
      </p>
    </section>

    <section class="main-card">
      <label class="upload-box" for="imageInput">
        <div class="upload-icon">📸</div>
        <div class="upload-title">사진 업로드하기</div>
        <div class="upload-desc">얼굴이 잘 보이는 사진일수록 결과가 좋아요</div>
      </label>

      <input type="file" id="imageInput" accept="image/*" />

      <div class="preview-wrap" id="previewWrap">
        <img id="preview" alt="업로드한 사진 미리보기" />
      </div>

      <div class="button-row">
        <button class="primary-btn" id="analyzeBtn" onclick="analyzeImage()">
          몬스터 찾기 🔍
        </button>
        <button class="ghost-btn" onclick="resetImage()">
          다시 고르기
        </button>
      </div>

      <div class="loading" id="loading">
        <div class="loader-monster">
          <div class="loader-mouth"></div>
        </div>
        <div class="loading-text">
          몬스터 찾는 중<span class="loading-dots"></span>
        </div>
      </div>

      <div id="result"></div>
    </section>
  </main>

  <script>
    const API_URL = "https://maple-monster-match.onrender.com/match";

    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const previewWrap = document.getElementById("previewWrap");
    const resultBox = document.getElementById("result");
    const loading = document.getElementById("loading");
    const analyzeBtn = document.getElementById("analyzeBtn");

    let selectedBase64 = "";

    imageInput.addEventListener("change", function () {
      const file = imageInput.files[0];

      if (!file) return;

      const reader = new FileReader();

      reader.onload = function (e) {
        selectedBase64 = e.target.result;
        preview.src = selectedBase64;
        previewWrap.style.display = "block";
        resultBox.innerHTML = "";
      };

      reader.readAsDataURL(file);
    });

    async function analyzeImage() {
      if (!selectedBase64) {
        alert("사진을 먼저 선택해줘!");
        return;
      }

      loading.style.display = "block";
      resultBox.innerHTML = "";
      analyzeBtn.disabled = true;

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            image_base64: selectedBase64,
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "API 호출 실패");
        }

        if (!data.results || data.results.length === 0) {
          resultBox.innerHTML = `
            <div class="error">
              닮은 몬스터를 찾지 못했어요 😭
            </div>
          `;
          return;
        }

        renderResult(data);

      } catch (error) {
        console.error(error);
        resultBox.innerHTML = `
          <div class="error">
            API 호출 실패 😭<br />
            ${error.message}
          </div>
        `;
      } finally {
        loading.style.display = "none";
        analyzeBtn.disabled = false;
      }
    }

    function renderResult(data) {
      const analysis = data.analysis || {};
      const tags = analysis.tags || [];
      const vibe = analysis.vibe || "사진의 전체 분위기를 분석했어요.";

      resultBox.innerHTML = `
        <div class="analysis-box">
          <h3>AI 분석 결과 ✨</h3>
          <p>${escapeHtml(vibe)}</p>
          <div class="tag-list">
            ${tags.map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join("")}
          </div>
        </div>

        <h2 class="result-title">닮은 메이플 몬스터 TOP 3</h2>

        <div class="card-list">
          ${data.results.map((monster, index) => {
            const percent = monster.percent || 70;
            return `
              <div class="monster-card ${index === 0 ? "top1" : ""}" style="animation-delay:${index * 0.12}s">
                <div class="rank">${index + 1}위</div>

                ${
                  monster.image_url
                    ? `<img src="${escapeAttr(monster.image_url)}" alt="${escapeAttr(monster.name)}" />`
                    : ""
                }

                <h3>${escapeHtml(monster.name || "이름 없음")}</h3>

                <div class="percent">
                  <div class="percent-top">
                    <span>닮은 정도</span>
                    <span>${percent}%</span>
                  </div>
                  <div class="bar">
                    <div class="bar-fill" style="--percent:${percent}%"></div>
                  </div>
                </div>

                <p>${escapeHtml(monster.reason || "전체적인 분위기가 비슷해서 매칭됐어요.")}</p>

                <div class="tag-list">
                  ${(monster.tags || []).map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join("")}
                </div>
              </div>
            `;
          }).join("")}
        </div>

        <div class="share-area">
          <button class="share-btn" onclick="shareResult()">결과 공유하기 💌</button>
        </div>
      `;

      setTimeout(() => {
        document.getElementById("result").scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      }, 100);
    }

    function resetImage() {
      selectedBase64 = "";
      imageInput.value = "";
      preview.src = "";
      previewWrap.style.display = "none";
      resultBox.innerHTML = "";
    }

    function shareResult() {
      const shareUrl = window.location.href;

      if (navigator.share) {
        navigator.share({
          title: "메이플 몬스터 닮은꼴 테스트",
          text: "내가 닮은 메이플 몬스터는?!",
          url: shareUrl,
        });
      } else {
        navigator.clipboard.writeText(shareUrl);
        alert("링크가 복사됐어!");
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
