name: Analyze Monsters AI

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install pandas openai

      - name: Run analyzer
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python analyze_monsters.py

      - name: Commit result
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add monsters_ai.csv
          git commit -m "generate ai monsters csv" || echo "No changes"
          git push
