name: Make Monsters CSV

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install requests beautifulsoup4 pandas

      - name: Run crawler
        run: |
          python make_monsters_csv.py

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add monsters_full.csv
          git commit -m "generate monsters full csv" || echo "No changes"
          git push
